<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen bg-gradient-to-t from-gray-100 to-gray-300 flex items-center justify-around p-10 md:p-5 gap-10 flex-col-reverse md:flex-row">

            <p class="text-sm tracking-widest text-gray-500 uppercase">Welcome to my website</p>
            <h1 class="text-3xl mt-2 md:text-5xl tracking-tight leading-tight font-bold">Build Modern Website With <span class="text-orange-700 block">Tailwind CSS</span></h1>

            <div class="mt-4 flex flex-col gap-3 md:flex-row">
                <button class="bg-blue-500 text-white hover:bg-blue-700 transition duration-200 ease-in-out py-3 px-4 rounded-lg">Download CV</button>

            </div>
        </div>
        <div class="w-full md:w-1/2 flex justify-center">
            <img class="w-80 h-80 rounded-full object-cover" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2LfdRvCIdTQ2qlrWqnlAN6N6bkkRgvZN1YA&s">
